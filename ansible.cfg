[defaults]
# Roles are stored under ansible/roles — ansible-lint and playbooks need this
roles_path         = ansible/roles

# Default inventory for local runs
inventory          = ansible/inventory/hosts.yml

# Suppress deprecation noise in CI
deprecation_warnings = false

# Interpreter discovery — silence warnings in CI
interpreter_python = auto_silent

[ssh_connection]
# Speed up SSH connections
pipelining = true
