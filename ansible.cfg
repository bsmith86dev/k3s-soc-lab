[defaults]
# Roles are stored under ansible/roles — ansible-lint and playbooks need this
roles_path         = ansible/roles

# Default inventory for local runs
inventory          = ansible/inventory/hosts.yml

# Suppress deprecation noise in CI
deprecation_warnings = false

# Interpreter discovery — silence warnings in CI
interpreter_python = auto_silent

# Increase gather timeout
gather_timeout = 30

[ssh_connection]
# Speed up SSH connections
pipelining = true
# Keep connections alive to prevent drops
ssh_args = -o ServerAliveInterval=30 -o ServerAliveCountMax=3 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s
timeout = 30
