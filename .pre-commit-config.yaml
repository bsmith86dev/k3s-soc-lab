---
default_language_version:
  python: python3.10

repos:
  # Core hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: mixed-line-ending
        args: [--fix=lf]

  # Security (you NEED this for your field)
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - .*-sealed\.yml
          - --exclude-files
          - vault\.yml
        exclude: ^\.ansible/

  # YAML linting
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint

  # Ansible lint (ISOLATED + FIXED)
  - repo: https://github.com/ansible/ansible-lint
    rev: v6.22.2
    hooks:
      - id: ansible-lint
        language_version: python3.10
        additional_dependencies:
          - ansible-core>=2.16
