---
# .pre-commit-config.yaml
# Runs automatically on every git commit (after: pre-commit install)
# Same checks as CI pipeline — catches issues before push
#
# Setup (run once on Skynet):
#   pip install pre-commit detect-secrets
#   pre-commit install
#   detect-secrets scan \
#     --exclude-files '.*-sealed\.yml' \
#     --exclude-files 'vault\.yml' \
#     > .secrets.baseline

repos:

  # Secret detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
          - --exclude-files
          - .*-sealed\.yml
          - --exclude-files
          - vault\.yml

  # Ansible lint
  - repo: https://github.com/ansible/ansible-lint
    rev: v24.2.0
    hooks:
      - id: ansible-lint
        files: ansible/
        exclude: ansible/inventory/group_vars/all/vault\.yml

  # General file hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: .*-sealed\.yml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-executables-have-shebangs

  # YAML lint
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
        exclude: .*-sealed\.yml
