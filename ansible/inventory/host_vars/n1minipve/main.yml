---
# ansible/inventory/host_vars/n1minipve/main.yml
# Node-specific overrides for N1 Mini PVE
# Hardware: Ryzen 7 5825U, 16GB DDR4

proxmox_role: secondary

proxmox_nic: "nic0"              # Verify with: ip link show
proxmox_mgmt_ip: "10.0.10.21"
proxmox_ceph_pub_ip: "10.0.30.21"

# No GPU on N1 Mini — IOMMU not needed
proxmox_enable_iommu: false
proxmox_vfio_pci_ids: ""

# N1 Mini hosts Gitea and PBS LXC containers
proxmox_provision_lxc: true

# N1 Mini does not provision VMs — AMDPVE handles all VMs
proxmox_provision_vms: false
