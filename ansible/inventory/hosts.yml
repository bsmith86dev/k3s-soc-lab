---
# ansible/inventory/hosts.yml
# All managed hosts in the blerdmh lab

all:
  children:

    # ── pfSense firewall (SSH for pfsensible.core XML management) ─────────
    pfsense_fw:
      hosts:
        pfsense:
          ansible_host: 10.0.10.1
          ansible_user: admin                                # admin = UID 0 on pfSense; required for pkg and config.xml
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          # pfsensible.core modules run ON pfSense (they read /cf/conf/config.xml locally).
          # pfSense 2.7+ / FreeBSD 14 ships Python 3.11 at /usr/local/bin/python3.11.
          # Non-interactive Ansible SSH bypasses the pfSense console menu automatically.
          ansible_python_interpreter: /usr/local/bin/python3.11
          ansible_shell_type: sh

    # ── Proxmox nodes (SSH as root) ────────────────────────────────────────
    proxmox_nodes:
      hosts:
        amdpve:
          ansible_host: 10.0.10.20
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          proxmox_role: primary

        n1minipve:
          ansible_host: 10.0.10.21
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          proxmox_role: secondary

    # ── k3s cluster ────────────────────────────────────────────────────────
    k3s_control_plane:
      hosts:
        k3s-cp:
          ansible_host: 10.0.20.10
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: server

    k3s_workers:
      hosts:
        k3s-w1:
          ansible_host: 10.0.20.11
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: agent

        k3s-w2-amd:
          ansible_host: 10.0.20.12
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: agent
          has_amd_gpu: true

        k3s-w3-n1:
          ansible_host: 10.0.20.13
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: agent

    # ── NAS ────────────────────────────────────────────────────────────────
    # TrueNAS Scale — SSH access for limited tasks only
    # Pool/dataset management is manual or via TrueNAS API
    nas:
      hosts:
        truenas:
          ansible_host: 10.0.20.5
          ansible_user: truenas_admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # ── Convenience groups ─────────────────────────────────────────────────
    linux_hosts:
      children:
        proxmox_nodes:
        k3s_control_plane:
        k3s_workers:
        nas:
        wazuh_manager:
        ids_vm:
        openvas_vm:
        grafana_vm:
        red_team_vms:
        gitea_servers:
        pbs_servers:
        pihole_servers:

    k3s_cluster:
      children:
        k3s_control_plane:
        k3s_workers:

    # ── Security stack VMs (VLAN 40, provisioned by proxmox role) ─────────
    wazuh_manager:
      hosts:
        wazuh-vm:
          ansible_host: 10.0.40.10
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    ids_vm:
      hosts:
        ids-vm:
          ansible_host: 10.0.40.11
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    openvas_vm:
      hosts:
        openvas-vm:
          ansible_host: 10.0.40.12
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    grafana_vm:
      hosts:
        grafana-vm:
          ansible_host: 10.0.40.13
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # ── Red / Purple lab VMs ───────────────────────────────────────────────
    red_team_vms:
      hosts:
        kali-red:
          ansible_host: 10.0.61.10
          ansible_user: kali
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    purple_lab_vms:
      hosts:
        win-target:
          ansible_host: 10.0.62.10
          ansible_connection: winrm
          ansible_user: Administrator
          ansible_winrm_transport: ntlm
        win-workstation:
          ansible_host: 10.0.62.11
          ansible_connection: winrm
          ansible_user: Administrator
          ansible_winrm_transport: ntlm

    # ── Service LXC containers ─────────────────────────────────────────────
    gitea_servers:
      hosts:
        gitea1:
          ansible_host: 10.0.10.50
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    pbs_servers:
      hosts:
        pbs:
          ansible_host: 10.0.20.30
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    pihole_servers:
      hosts:
        pihole:
          ansible_host: 10.0.10.3
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
