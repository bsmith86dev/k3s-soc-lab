---
# ansible/inventory/hosts.yml
# All managed hosts in the blerdmh lab
# pfSense is NOT listed here — pfsensible.core connects to it directly via delegate_to

all:
  children:

    # ── Proxmox nodes (SSH as root) ────────────────────────────────────────
    proxmox_nodes:
      hosts:
        amdpve:
          ansible_host: 10.0.10.20
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          proxmox_role: primary

        n1minipve:
          ansible_host: 10.0.10.21
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          proxmox_role: secondary

    # ── k3s cluster ────────────────────────────────────────────────────────
    k3s_control_plane:
      hosts:
        k3s-cp:
          ansible_host: 10.0.20.10
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: server

    k3s_workers:
      hosts:
        k3s-w1:
          ansible_host: 10.0.20.11
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
          k3s_role: agent

    # k3s-w2-amd (disabled — not yet provisioned):
    # k3s-w2-amd:
    #   ansible_host: 10.0.20.12
    #   ansible_user: techinb
    #   ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    #   k3s_role: agent
    #   has_amd_gpu: true

    # ── NAS ────────────────────────────────────────────────────────────────
    # TrueNAS Scale — SSH access for limited tasks only
    # Pool/dataset management is manual or via TrueNAS API
    nas:
      hosts:
        truenas:
          ansible_host: 10.0.20.5
          ansible_user: truenas_admin
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # ── Convenience groups ─────────────────────────────────────────────────
    linux_hosts:
      children:
        proxmox_nodes:
        k3s_control_plane:
        k3s_workers:
        nas:
        wazuh_manager:
        ids_vm:
        openvas_vm:
        gitea_servers:

    k3s_cluster:
      children:
        k3s_control_plane:
        k3s_workers:

    # ── Security stack VMs (VLAN 40, provisioned by proxmox role) ─────────
    wazuh_manager:
      hosts:
        wazuh-vm:
          ansible_host: 10.0.40.10
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    ids_vm:
      hosts:
        ids-vm:
          ansible_host: 10.0.40.11
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    openvas_vm:
      hosts:
        openvas-vm:
          ansible_host: 10.0.40.12
          ansible_user: techinb
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519

    # ── Service LXC containers ─────────────────────────────────────────────
    gitea_servers:
      hosts:
        gitea1:
          ansible_host: 10.0.10.50
          ansible_user: root
          ansible_ssh_private_key_file: ~/.ssh/id_ed25519
