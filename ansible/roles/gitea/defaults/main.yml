---
# ansible/roles/gitea/defaults/main.yml

gitea_version: "1.22.3"
gitea_arch: "arm64"  # LXC on N1 Mini is x86_64 — override if needed; arm64 for Pi, amd64 for x86

gitea_http_port: 3000
gitea_admin_user: "techinb"
gitea_admin_email: "admin@lab.blerdmh.local"
gitea_github_user: "techinb"   # Your GitHub username

# How often Gitea pulls from GitHub
# Format: Xh (hours), Xm (minutes)
gitea_mirror_interval: "1h"

# Secrets come from vault.yml:
#   vault_gitea_admin_password
#   vault_gitea_secret_key
#   vault_gitea_github_token    — GitHub PAT (repo:read scope)
