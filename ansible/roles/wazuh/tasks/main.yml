---
# ansible/roles/wazuh/tasks/main.yml
# Deploy Wazuh SIEM stack and distribute agents to all lab hosts
#
# Architecture:
#   wazuh-vm (10.0.40.10) — Wazuh Manager + Dashboard + OpenSearch
#   All other lab hosts   — Wazuh agent (ships logs to manager)
#
# Run order matters — manager must be up before agents are deployed
#
# Tags allow surgical re-runs:
#   --tags wazuh,manager   — reinstall/reconfigure manager only
#   --tags wazuh,agents    — redeploy agents only
#   --tags wazuh,rules     — push custom detection rules only

- name: Install Wazuh manager
  ansible.builtin.import_tasks: manager.yml
  tags: [wazuh, manager]
  when: inventory_hostname == wazuh_manager_host

- name: Deploy Wazuh agents to all lab hosts
  ansible.builtin.import_tasks: agents.yml
  tags: [wazuh, agents]
  when: inventory_hostname != wazuh_manager_host

- name: Deploy custom detection rules
  ansible.builtin.import_tasks: rules.yml
  tags: [wazuh, rules]
  when: inventory_hostname == wazuh_manager_host

- name: Configure Wazuh active response
  ansible.builtin.import_tasks: active-response.yml
  tags: [wazuh, active-response]
  when: inventory_hostname == wazuh_manager_host
