---
# ansible/roles/proxmox/tasks/repos.yml
# Remove enterprise repo nag, enable no-subscription repo
# Must run before packages.yml

# ansible/roles/proxmox/tasks/repos.yml
# Clean repo management + safe subscription nag patch

- name: Remove Proxmox enterprise repo if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent
  failed_when: false
  tags:
    - repos

- name: Remove Ceph enterprise repo if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent
  failed_when: false
  tags:
    - repos

- name: Add PVE no-subscription repo
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/pve {{ ansible_distribution_release }} pve-no-subscription"
    filename: pve-no-subscription
    state: present

- name: Add Ceph no-subscription repo
  ansible.builtin.apt_repository:
    repo: "deb http://download.proxmox.com/debian/ceph-squid {{ ansible_distribution_release }} no-subscription"
    filename: ceph-no-subscription
    state: present

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - repos

# 🔥 SAFE version (no more OOM / killed process issues)
# Properly disables the subscription check by wrapping it in a false condition
- name: Disable subscription nag (safe patch)
  ansible.builtin.shell:
    cmd: |
      # Check if already patched
      if grep -q "false && data.status" /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js; then
        echo "Already patched"
        exit 0
      fi

      # Backup before patching
      cp /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js.bak

      # Replace the subscription check with a disabled condition
      sed -i "s/data.status !== 'Active'/false \&\& data.status !== 'Active'/g" /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js

      echo "Patched successfully"
  register: proxmox_nag_patch
  changed_when: "'already patched' not in proxmox_nag_patch.stdout"
  failed_when: false
  notify: restart pveproxy
  tags:
    - proxmox
