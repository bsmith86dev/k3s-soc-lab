---
# ansible/roles/proxmox/tasks/repos.yml
# Remove enterprise repo nag, enable no-subscription repo
# Must run before packages.yml

# ansible/roles/proxmox/tasks/repos.yml
# Clean repo management + safe subscription nag patch

- name: Remove Proxmox enterprise repo if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    state: absent
  failed_when: false
  tags:
    - repos

- name: Remove Ceph enterprise repo if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/ceph.list
    state: absent
  failed_when: false
  tags:
    - repos

- name: Add Proxmox no-subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
    owner: root
    group: root
    mode: '0644'
  tags:
    - repos

- name: Add Ceph no-subscription repo (optional)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/ceph-reef bookworm no-subscription
    owner: root
    group: root
    mode: '0644'
  when: proxmox_install_ceph | default(false) | bool
  tags:
    - repos

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - repos

# 🔥 SAFE version (no more OOM / killed process issues)
- name: Disable subscription nag (safe patch)
  ansible.builtin.lineinfile:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: "data.status !== 'Active'"
    line: "false"
    backup: yes
  notify: restart pveproxy
  failed_when: false
  tags:
    - proxmox
