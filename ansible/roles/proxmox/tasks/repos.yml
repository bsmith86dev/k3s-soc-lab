---
# ansible/roles/proxmox/tasks/repos.yml
# Remove enterprise repo nag, enable no-subscription repo
# Must run before packages.yml

- name: Disable Proxmox enterprise repo
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb'
    replace: '# deb'
  ignore_errors: yes   # File may not exist on fresh install

- name: Disable Ceph enterprise repo
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/ceph.list
    regexp: '^deb'
    replace: '# deb'
  ignore_errors: yes

- name: Add Proxmox no-subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve bookworm pve-no-subscription
    owner: root
    group: root
    mode: '0644'

- name: Add Ceph no-subscription repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/ceph-reef bookworm no-subscription
    owner: root
    group: root
    mode: '0644'
  when: proxmox_install_ceph | bool

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Remove subscription nag from web UI
  ansible.builtin.replace:
    path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
    regexp: "res === null || res === undefined || !res || res"
    replace: "false"
  notify: restart pveproxy
  ignore_errors: yes   # File path may change across PVE versions — non-fatal
