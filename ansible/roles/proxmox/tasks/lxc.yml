---
# ansible/roles/proxmox/tasks/lxc.yml
# Provision LXC containers on Proxmox nodes
# Uses pct CLI directly on the node (runs as root) because the Proxmox API
# restricts LXC template operations to root@pam — API tokens under other
# users hit "Only root can pass arbitrary filesystem paths".
#
# All containers defined in proxmox_lxc_containers list (defaults/main.yml)
# Prerequisites:
#   - Ubuntu 24.04 LXC template downloaded to TrueNAS ISO store
#     Download: pveam download nfs-truenas-iso ubuntu-24.04-standard_24.04-2_amd64.tar.zst
#   - Storage backends registered (storage-nfs.yml complete)

- name: Set default LXC template name
  ansible.builtin.set_fact:
    proxmox_lxc_template_name: "ubuntu-24.04-standard_24.04-2_amd64.tar.zst"

- name: Check if NFS ISO storage is available
  ansible.builtin.command:
    cmd: pvesm status --storage nfs-truenas-iso
  register: proxmox_nfs_iso_check
  changed_when: false
  failed_when: false

- name: Warn if NFS ISO storage not available
  ansible.builtin.debug:
    msg: >-
      WARNING: nfs-truenas-iso storage not available. Skipping LXC template
      download. Ensure TrueNAS is online and NFS storage is registered.
  when: proxmox_nfs_iso_check.rc != 0

- name: Update available LXC template list from Proxmox repos
  ansible.builtin.command:
    cmd: pveam update
  changed_when: false
  when: proxmox_nfs_iso_check.rc == 0

- name: Find latest Ubuntu 24.04 LXC template name
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      pveam available --section system
      | awk '/ubuntu-24.04-standard/ {print $2}'
      | sort -V
      | tail -1
    executable: /bin/bash
  register: proxmox_lxc_template_name_raw
  changed_when: false
  when: proxmox_nfs_iso_check.rc == 0

- name: Update LXC template name from repo listing
  ansible.builtin.set_fact:
    proxmox_lxc_template_name: "{{ proxmox_lxc_template_name_raw.stdout }}"
  when:
    - proxmox_nfs_iso_check.rc == 0
    - proxmox_lxc_template_name_raw.stdout | default('') | length > 0

- name: Download Ubuntu 24.04 LXC template if not present
  ansible.builtin.command:
    cmd: pveam download nfs-truenas-iso {{ proxmox_lxc_template_name }}
  register: proxmox_template_download
  changed_when: proxmox_template_download.rc == 0
  failed_when:
    - proxmox_template_download.rc != 0
    - "'already exists' not in proxmox_template_download.stderr"
    - "'already downloaded' not in proxmox_template_download.stdout"
  when:
    - proxmox_nfs_iso_check.rc == 0
    - proxmox_lxc_template_name | length > 0


- name: Provision LXC containers
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -eo pipefail
      if pct config {{ item.vmid }} >/dev/null 2>&1; then
        echo "exists"
        exit 0
      fi
      tmpkey=$(mktemp)
      trap 'rm -f "$tmpkey"' EXIT
      echo '{{ lookup("file", "~/.ssh/id_ed25519.pub") }}' > "$tmpkey"
      echo "creating"
      pct create {{ item.vmid }} \
        '{{ item.ostemplate | default("nfs-truenas-iso:vztmpl/" + proxmox_lxc_template_name) }}' \
        --hostname '{{ item.hostname }}' \
        --rootfs '{{ item.storage | default(proxmox_default_storage) }}:{{ item.disk | default("20") }}' \
        --cores '{{ item.cores | default(2) }}' \
        --memory '{{ item.memory | default(2048) }}' \
        --swap '{{ item.swap | default(512) }}' \
        --ssh-public-keys "$tmpkey" \
        --net0 '{{ item.netif.net0 }}' \
        --nameserver '{{ item.nameservers | default("10.0.10.1") }}' \
        --searchdomain '{{ item.searchdomain | default("lab.blerdmh.local") }}' \
        --onboot '{{ (item.onboot | default(true)) | ternary(1, 0) }}' \
        --unprivileged '{{ (item.unprivileged | default(true)) | ternary(1, 0) }}' \
        --description '{{ item.description | default("") }}' \
        --password '{{ vault_lxc_root_password }}'
  delegate_to: "{{ item.node }}"
  loop: "{{ proxmox_lxc_containers }}"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.hostname }})"
  register: proxmox_lxc_create
  changed_when: "'creating' in (proxmox_lxc_create.stdout | default(''))"
  no_log: true
  when: proxmox_nfs_iso_check.rc == 0

- name: Start LXC containers
  ansible.builtin.command:
    cmd: pct start {{ item.vmid }}
  delegate_to: "{{ item.node }}"
  loop: "{{ proxmox_lxc_containers }}"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.hostname }})"
  register: proxmox_lxc_start
  changed_when: proxmox_lxc_start.rc == 0
  failed_when:
    - proxmox_lxc_start.rc != 0
    - "'already running' not in (proxmox_lxc_start.stderr | default(''))"
  when: proxmox_nfs_iso_check.rc == 0

- name: Wait for LXC containers to be reachable
  ansible.builtin.wait_for:
    host: "{{ item.netif.net0 | regex_search('ip=([0-9.]+)', '\\1') | first }}"
    port: 22
    delay: 5
    timeout: 60
  loop: "{{ proxmox_lxc_containers }}"
  delegate_to: localhost
  become: false
  register: proxmox_lxc_ssh_wait
  failed_when: false
  when: proxmox_nfs_iso_check.rc == 0

- name: Report LXC containers that did not respond on SSH
  ansible.builtin.debug:
    msg: >
      WARNING: LXC {{ item.item.hostname }} (vmid {{ item.item.vmid }}) did not respond
      on SSH within 60s. Check 'pct status {{ item.item.vmid }}' on
      {{ item.item.node }} and inspect the container console for errors.
  loop: "{{ proxmox_lxc_ssh_wait.results | default([]) }}"
  loop_control:
    label: "vmid {{ item.item.vmid }}"
  when:
    - proxmox_nfs_iso_check.rc == 0
    - item.failed | default(false)
