---
# ansible/roles/proxmox/tasks/lxc.yml
# Provision LXC containers on Proxmox nodes
# Uses community.general.proxmox module via Proxmox API
#
# All containers defined in proxmox_lxc_containers list (defaults/main.yml)
# Prerequisites:
#   - Proxmox API token in vault.yml
#   - Ubuntu 24.04 LXC template downloaded to TrueNAS ISO store
#     Download: pveam download nfs-truenas-iso ubuntu-24.04-standard_24.04-2_amd64.tar.zst
#   - Storage backends registered (storage-nfs.yml complete)

- name: Set default LXC template name
  ansible.builtin.set_fact:
    lxc_template_name: "ubuntu-24.04-standard_24.04-2_amd64.tar.zst"

- name: Check if NFS ISO storage is available
  ansible.builtin.command:
    cmd: pvesm status --storage nfs-truenas-iso
  register: nfs_iso_check
  changed_when: false
  failed_when: false
  run_once: true

- name: Warn if NFS ISO storage not available
  ansible.builtin.debug:
    msg: >-
      WARNING: nfs-truenas-iso storage not available. Skipping LXC template
      download. Ensure TrueNAS is online and NFS storage is registered.
  when: nfs_iso_check.rc != 0
  run_once: true

- name: Update available LXC template list from Proxmox repos
  ansible.builtin.command:
    cmd: pveam update
  changed_when: false
  when: nfs_iso_check.rc == 0
  run_once: true

- name: Find latest Ubuntu 24.04 LXC template name
  ansible.builtin.shell:
    cmd: >-
      set -o pipefail;
      pveam available --section system
      | awk '/ubuntu-24.04-standard/ {print $2}'
      | sort -V
      | tail -1
    executable: /bin/bash
  register: lxc_template_name_raw
  changed_when: false
  when: nfs_iso_check.rc == 0
  run_once: true

- name: Update LXC template name from repo listing
  ansible.builtin.set_fact:
    lxc_template_name: "{{ lxc_template_name_raw.stdout }}"
  when:
    - nfs_iso_check.rc == 0
    - lxc_template_name_raw.stdout | default('') | length > 0
  run_once: true

- name: Download Ubuntu 24.04 LXC template if not present
  ansible.builtin.command:
    cmd: pveam download nfs-truenas-iso {{ lxc_template_name }}
  register: template_download
  changed_when: template_download.rc == 0
  failed_when:
    - template_download.rc != 0
    - "'already exists' not in template_download.stderr"
    - "'already downloaded' not in template_download.stdout"
  when:
    - nfs_iso_check.rc == 0
    - lxc_template_name | length > 0
  run_once: true

- name: Provision LXC containers
  community.general.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    vmid: "{{ item.vmid }}"
    hostname: "{{ item.hostname }}"
    node: "{{ item.node }}"
    ostemplate: "{{ item.ostemplate | default('nfs-truenas-iso:vztmpl/' + lxc_template_name) }}"
    storage: "{{ item.storage | default(proxmox_default_storage) }}"
    disk: "{{ item.disk | default('20') }}"
    cores: "{{ item.cores | default(2) }}"
    memory: "{{ item.memory | default(2048) }}"
    swap: "{{ item.swap | default(512) }}"
    password: "{{ vault_lxc_root_password }}"
    pubkey: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
    netif: "{{ item.netif }}"
    nameserver: "{{ item.nameservers | default('10.0.10.1') }}"
    searchdomain: "{{ item.searchdomain | default('lab.blerdmh.local') }}"
    features: "{{ item.features | default({}) }}"
    onboot: "{{ item.onboot | default(true) }}"
    unprivileged: "{{ item.unprivileged | default(true) }}"
    description: "{{ item.description | default('') }}"
    state: present
  loop: "{{ proxmox_lxc_containers }}"
  delegate_to: localhost
  become: false
  when: nfs_iso_check.rc == 0

- name: Start LXC containers
  community.general.proxmox:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    vmid: "{{ item.vmid }}"
    node: "{{ item.node }}"
    state: started
  loop: "{{ proxmox_lxc_containers }}"
  delegate_to: localhost
  become: false
  when: nfs_iso_check.rc == 0

- name: Extract IP from netif for readiness check
  ansible.builtin.set_fact:
    _lxc_readiness_targets: >-
      {{
        proxmox_lxc_containers
        | map('combine', {'_wait_ip':
            (item.netif.net0 | regex_search('ip=([0-9.]+)', '\\1') | first)
          })
        | list
      }}
  when: nfs_iso_check.rc == 0

- name: Wait for LXC containers to be reachable
  ansible.builtin.wait_for:
    host: "{{ item.netif.net0 | regex_search('ip=([0-9.]+)', '\\1') | first }}"
    port: 22
    delay: 5
    timeout: 60
  loop: "{{ proxmox_lxc_containers }}"
  delegate_to: localhost
  become: false
  failed_when: result.rc != 0 and "expected error text" not in result.stderr
  when: nfs_iso_check.rc == 0
