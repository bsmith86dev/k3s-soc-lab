---
# ansible/roles/proxmox/tasks/main.yml
# Proxmox VE post-install configuration
#
# Prerequisites:
#   - Proxmox VE installed via ISO
#   - Cluster already formed manually (pvecm create / pvecm add)
#   - SSH key deployed to root
#   - Node reachable at its MGMT VLAN IP (10.0.10.x)
#
# Run order is intentional — do not reorder
# Each task file is independently taggable for surgical re-runs

- name: Configure package repositories
  ansible.builtin.import_tasks: repos.yml
  tags: [proxmox, repos]

- name: Install required packages
  ansible.builtin.import_tasks: packages.yml
  tags: [proxmox, packages]

- name: Configure network bridges
  ansible.builtin.import_tasks: network.yml
  tags: [proxmox, network]

- name: Configure IOMMU / PCIe passthrough
  ansible.builtin.import_tasks: iommu.yml
  tags: [proxmox, iommu]
  when: proxmox_enable_iommu | bool

- name: Add NFS storage backend (TrueNAS)
  ansible.builtin.import_tasks: storage-nfs.yml
  tags: [proxmox, storage, nfs]

- name: Add Proxmox Backup Server storage backend
  ansible.builtin.import_tasks: storage-pbs.yml
  tags: [proxmox, storage, pbs]

- name: Configure datacenter options
  ansible.builtin.import_tasks: datacenter.yml
  tags: [proxmox, datacenter]

- name: Harden Proxmox node
  ansible.builtin.import_tasks: hardening.yml
  tags: [proxmox, hardening]

- name: Provision LXC containers
  ansible.builtin.import_tasks: lxc.yml
  tags: [proxmox, lxc]
  when: proxmox_provision_lxc | bool

- name: Provision virtual machines
  ansible.builtin.import_tasks: vms.yml
  tags: [proxmox, vms]
  when: proxmox_provision_vms | bool
