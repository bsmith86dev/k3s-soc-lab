---
# ansible/roles/proxmox/tasks/packages.yml
# Install packages needed for lab operations on all Proxmox nodes

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: yes
  when: proxmox_upgrade_packages | bool

- name: Install required packages
  ansible.builtin.apt:
    name:
      # System utilities
      - curl
      - wget
      - git
      - htop
      - iotop
      - iftop
      - net-tools
      - dnsutils
      - tcpdump
      - nmap
      - lsof
      - strace
      # Storage
      - zfsutils-linux
      - nfs-common
      - smartmontools
      # Security
      - fail2ban
      - ufw
      # Python (needed for Ansible modules)
      - python3
      - python3-pip
      - python3-proxmoxer    # Required for community.general.proxmox modules
      - python3-requests
      # Proxmox tools
      - libpve-storage-perl
      - pve-headers
    state: present
    update_cache: no   # Already done in repos.yml

- name: Install Ceph packages
  ansible.builtin.apt:
    name:
      - ceph
      - ceph-common
      - ceph-mgr
      - ceph-mon
      - ceph-osd
    state: present
  when: proxmox_install_ceph | bool
