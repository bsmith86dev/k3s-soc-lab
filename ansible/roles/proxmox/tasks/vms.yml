---
# ansible/roles/proxmox/tasks/vms.yml
# Provision virtual machines on Proxmox nodes
# Uses community.general.proxmox_kvm module via Proxmox API
#
# All VMs defined in proxmox_vms list (defaults/main.yml)
# Cloud-init is used for initial configuration (hostname, SSH key, IP)
#
# Prerequisites:
#   - Ubuntu 24.04 cloud image downloaded and converted to template
#     Run once on AMDPVE:
#       wget https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
#       qm create 9000 --name ubuntu-24.04-template --memory 2048 --cores 2 --net0 virtio,bridge=vmbr0
#       qm importdisk 9000 noble-server-cloudimg-amd64.img local-zfs
#       qm set 9000 --scsihw virtio-scsi-pci --scsi0 local-zfs:vm-9000-disk-0
#       qm set 9000 --ide2 local-zfs:cloudinit --boot c --bootdisk scsi0
#       qm set 9000 --serial0 socket --vga serial0
#       qm template 9000
#   - Proxmox API token in vault.yml

- name: Check if cloud-init VM template exists
  ansible.builtin.command:
    cmd: qm config {{ proxmox_vm_template_id }}
  register: proxmox_vm_template_check
  changed_when: false
  failed_when: false
  delegate_to: amdpve
  run_once: true

- name: Warn and skip VM provisioning if template missing
  ansible.builtin.debug:
    msg: >
      WARNING: Cloud-init template VMID {{ proxmox_vm_template_id }} not found.
      Skipping VM provisioning. Create the template on AMDPVE then rerun with --tags vms.
  when: proxmox_vm_template_check.rc != 0
  run_once: true

# Recover from previous broken runs: destroy any VM at one of our target VMIDs
# whose current name does NOT match what we expect. Earlier playbook versions
# called proxmox_kvm with `clone: <new_name>` but no `name:`, so Proxmox auto-named
# the clones "Copy-of-VM-<template>" and cloud-init's first-boot already completed
# on them — meaning the only safe recovery is destroy + reclone.
# On steady-state runs (names already correct), this task is a no-op.
- name: Remove stale or incorrectly-named VM clones
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      if ! qm config {{ item.vmid }} >/dev/null 2>&1; then
        echo "absent"
        exit 0
      fi
      current_name=$(qm config {{ item.vmid }} | awk '/^name:/ {print $2; exit}')
      if [ "$current_name" = "{{ item.name }}" ]; then
        echo "ok"
        exit 0
      fi
      echo "removing $current_name"
      if qm status {{ item.vmid }} 2>/dev/null | grep -q running; then
        qm stop {{ item.vmid }} --timeout 30 --skiplock 1 || true
        for _ in $(seq 1 15); do
          qm status {{ item.vmid }} 2>/dev/null | grep -q stopped && break
          sleep 1
        done
      fi
      qm destroy {{ item.vmid }} --purge 1 --destroy-unreferenced-disks 1 --skiplock 1
      echo "removed"
  register: proxmox_vm_cleanup
  changed_when: "'removing' in proxmox_vm_cleanup.stdout"
  loop: "{{ proxmox_vms }}"
  delegate_to: "{{ item.node }}"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }})"
  when: proxmox_vm_template_check.rc == 0

- name: Clone VMs from cloud-init template
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ proxmox_vm_template_node }}"        # template lives here
    vmid: "{{ proxmox_vm_template_id }}"          # source template VMID
    newid: "{{ item.vmid }}"                       # new VM VMID
    clone: "{{ proxmox_vm_template_name }}"        # source template NAME (required)
    # new VM NAME — without this, Proxmox auto-names clones "Copy-of-VM-<template>"
    name: "{{ item.name }}"
    full: true
    storage: "{{ item.storage | default(proxmox_default_storage) }}"
    timeout: 600
    state: present
  loop: "{{ proxmox_vms }}"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /home/workbench/CSLAB/SOC/blerdmh-lab/.venv/bin/python3
  register: proxmox_clone_result
  failed_when:
    - proxmox_clone_result.failed | default(false)
    - "'already exists' not in (proxmox_clone_result.msg | default(''))"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }})"
  when: proxmox_vm_template_check.rc == 0

# After cloning, VMs live on the template node (amdpve). VMs whose target
# node is different must be migrated before configuration. pmxcfs exposes
# each VM config at /etc/pve/nodes/<node>/qemu-server/<vmid>.conf, so we
# can cheaply check whether the VM is already on the right node.
- name: Migrate cross-node VMs to their target node
  ansible.builtin.shell:
    executable: /bin/bash
    cmd: |
      set -o pipefail
      if [ -f /etc/pve/nodes/{{ item.node }}/qemu-server/{{ item.vmid }}.conf ]; then
        echo "already_on_target"
        exit 0
      fi
      if [ ! -f /etc/pve/nodes/{{ proxmox_vm_template_node }}/qemu-server/{{ item.vmid }}.conf ]; then
        echo "vm_not_found"
        exit 1
      fi
      echo "migrating"
      qm migrate {{ item.vmid }} {{ item.node }}
  delegate_to: "{{ proxmox_vm_template_node }}"
  loop: "{{ proxmox_vms }}"
  register: proxmox_vm_migrate
  changed_when: "'migrating' in (proxmox_vm_migrate.stdout | default(''))"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }}) -> {{ item.node }}"
  when:
    - proxmox_vm_template_check.rc == 0
    - item.node != proxmox_vm_template_node

- name: Configure cloned VMs (CPU, RAM, network, cloud-init)
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    node: "{{ item.node }}"
    vmid: "{{ item.vmid }}"
    name: "{{ item.name }}"
    cores: "{{ item.cores | default(2) }}"
    sockets: "{{ item.sockets | default(1) }}"
    memory: "{{ item.memory | default(4096) }}"
    balloon: "{{ item.balloon | default(0) }}"
    # firewall=0 disables the per-VM Proxmox firewall on this NIC.
    # The cluster firewall has policy_in: DROP, which would otherwise
    # silently drop all inbound traffic to the VM. pfSense is the
    # authoritative network firewall — no need to layer another DROP here.
    #
    # When item.mac is set, pin it in the NIC config. Without pinning,
    # any future `qm set --net0` (or playbook update) replaces net0
    # entirely and Proxmox generates a fresh random MAC — which breaks
    # both the pfSense DHCP reservation AND cloud-init's netplan
    # MAC-match (interface comes back as ens18, DOWN, no IP).
    net:
      net0: "virtio{% if item.mac is defined %}={{ item.mac }}{% endif %},bridge=vmbr0,tag={{ item.vlan }},firewall=0"
    ipconfig:
      ipconfig0: "ip={{ item.ip }}/24,gw={{ item.gateway }}"
    # DNS defaults to the per-VLAN gateway (pfSense) so that each VM
    # resolves against its local interface — no cross-VLAN rules needed.
    nameservers: "{{ item.dns | default(item.gateway) }}"
    searchdomains: "lab.blerdmh.local"
    sshkeys: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"
    ciuser: "{{ item.ciuser | default('techinb') }}"
    cipassword: "{{ vault_vm_cipassword }}"
    description: "{{ item.description | default('') }}"
    tags: "{{ item.tags | default([]) }}"
    onboot: "{{ item.onboot | default(true) }}"
    agent: "enabled=1"
    update: true
    state: present
  loop: "{{ proxmox_vms }}"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /home/workbench/CSLAB/SOC/blerdmh-lab/.venv/bin/python3
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }})"
  when: proxmox_vm_template_check.rc == 0

- name: Resize VM disks to specified size
  community.general.proxmox_disk:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    vmid: "{{ item.vmid }}"
    disk: scsi0
    size: "{{ item.disk_size | default('40G') }}"
    state: resized
  loop: "{{ proxmox_vms }}"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /home/workbench/CSLAB/SOC/blerdmh-lab/.venv/bin/python3
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }}) -> {{ item.disk_size | default('40G') }}"
  when: proxmox_vm_template_check.rc == 0

- name: Start virtual machines
  community.general.proxmox_kvm:
    api_host: "{{ proxmox_api_host }}"
    api_user: "{{ proxmox_api_user }}@pam"
    api_token_id: "ansible"
    api_token_secret: "{{ vault_proxmox_api_token_secret }}"
    vmid: "{{ item.vmid }}"
    node: "{{ item.node }}"
    state: started
  loop: "{{ proxmox_vms }}"
  delegate_to: localhost
  become: false
  vars:
    ansible_python_interpreter: /home/workbench/CSLAB/SOC/blerdmh-lab/.venv/bin/python3
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }})"
  when: proxmox_vm_template_check.rc == 0

# Use QEMU guest agent ping (virtio-serial) instead of TCP wait_for.
# The controller (Skynet) has no L3 route to SECURITY/RED_TEAM VLANs —
# a TCP connect from localhost will time out for every VM in those VLANs,
# hanging the play for (n_vms × timeout) seconds. The guest agent travels
# over the virtio-serial bus and works regardless of guest network state.
# Skips VMs with onboot: false — they won't be running at this point.
- name: Give VMs initial time to boot before probing guest agent
  ansible.builtin.pause:
    seconds: 30
  when:
    - proxmox_vm_template_check.rc == 0
    - proxmox_vms | selectattr('onboot', 'defined') | selectattr('onboot', 'equalto', true) | list | length > 0

- name: Wait for QEMU guest agent to respond
  ansible.builtin.command:
    cmd: qm agent {{ item.vmid }} ping
  delegate_to: "{{ item.node }}"
  loop: "{{ proxmox_vms }}"
  loop_control:
    label: "vmid {{ item.vmid }} ({{ item.name }})"
  register: proxmox_vm_agent_ping
  until: proxmox_vm_agent_ping.rc == 0
  retries: 12
  delay: 5
  changed_when: false
  failed_when: false
  when:
    - proxmox_vm_template_check.rc == 0
    - item.onboot | default(true)

- name: Report VMs whose guest agent did not respond
  ansible.builtin.debug:
    msg: >
      WARNING: VM {{ item.item.name }} (vmid {{ item.item.vmid }}) guest agent
      did not respond after 5 minutes. Check 'qm status {{ item.item.vmid }}'
      on {{ item.item.node }} and inspect the console for cloud-init errors.
  loop: "{{ proxmox_vm_agent_ping.results | default([]) }}"
  loop_control:
    label: "vmid {{ item.item.vmid | default('?') }}"
  when:
    - proxmox_vm_template_check.rc == 0
    - item.skipped is not defined or not item.skipped
    - item.rc | default(1) != 0
