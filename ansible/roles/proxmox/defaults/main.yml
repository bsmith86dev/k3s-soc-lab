---
# ansible/roles/proxmox/defaults/main.yml
# Default variables for the proxmox role
# Override per-node in ansible/inventory/host_vars/<hostname>.yml

# ── General ───────────────────────────────────────────────────────────────

proxmox_upgrade_packages: true
proxmox_install_ceph: false          # Set true when Ceph cluster is ready

# ── API connection ────────────────────────────────────────────────────────

proxmox_api_host: "10.0.10.20"      # AMDPVE — primary node
proxmox_api_user: "ansible"
# proxmox_api_token_secret comes from vault.yml

# All node hostnames as Proxmox knows them (pvecm nodes output)
proxmox_cluster_nodes:
  - amdpve
  - n1minipve

# ── Network ───────────────────────────────────────────────────────────────

# Physical NIC connected to MokerLink — verify with: ip link show
# Override in host_vars per node
proxmox_nic: "enp5s0"               # AMDPVE default
# proxmox_nic: "enp2s0"             # N1 Mini — set in host_vars/n1minipve.yml

proxmox_mgmt_ip: ""                 # Set per node in host_vars
proxmox_mgmt_gateway: "10.0.10.1"
proxmox_mgmt_gw: "10.0.10.1"        # Alias used by interfaces.j2
proxmox_mgmt_vlan: 10

# ── Storage ───────────────────────────────────────────────────────────────

proxmox_truenas_ip: "10.0.20.5"

# Default VM/LXC storage — local-zfs is the ZFS pool on the OS NVMe
# (created by Proxmox installer on nvme0n1p3 on both nodes)
# Override per-item in proxmox_vms / proxmox_lxc_containers with item.storage
proxmox_default_storage: "local-zfs"

# ── IOMMU / PCIe passthrough ──────────────────────────────────────────────

# Only enable on AMDPVE — set false in host_vars/n1minipve.yml
proxmox_enable_iommu: false

# RX 5700 XT PCI IDs — find with: lspci -nn | grep -i amd
# Format: "1002:731f,1002:ab38"  (GPU + audio function)
# Leave empty until confirmed from lspci output on AMDPVE
proxmox_vfio_pci_ids: ""

# ── VM template ───────────────────────────────────────────────────────────

proxmox_vm_template_id: 9000        # Ubuntu 24.04 cloud-init template VMID
proxmox_vm_template_name: "ubuntu-24.04-template"

# Optional SSH readiness check for newly provisioned VMs.
proxmox_wait_for_ssh: true
proxmox_wait_for_ssh_delay: 10
proxmox_wait_for_ssh_timeout: 300
proxmox_wait_for_ssh_strict: false

# ── LXC containers to provision ───────────────────────────────────────────
# NOTE: do NOT set a top-level `ip:` key. The community.general.proxmox
# module consumes the IP from inside the netif string. A parallel `ip:`
# key causes the collection to double-configure the interface on some
# versions. Keep the IP/gw only inside netif.

proxmox_provision_lxc: true

proxmox_lxc_containers:
  - vmid: 302
    hostname: gitea
    node: n1minipve
    cores: 2
    memory: 2048
    disk: "20"
    description: "Self-hosted Gitea — GitHub mirror"
    netif:
      net0: "name=eth0,bridge=vmbr0,tag=10,ip=10.0.10.50/24,gw=10.0.10.1"
    nameservers: "10.0.10.1"
    searchdomain: "lab.blerdmh.local"
    onboot: true
    unprivileged: true

  - vmid: 310
    hostname: pbs
    node: n1minipve
    cores: 2
    memory: 4096
    disk: "20"
    description: "Proxmox Backup Server — stores backups on TrueNAS NFS"
    netif:
      net0: "name=eth0,bridge=vmbr0,tag=20,ip=10.0.20.30/24,gw=10.0.20.1"
    nameservers: "10.0.20.1"
    searchdomain: "lab.blerdmh.local"
    onboot: true
    unprivileged: false    # PBS requires privileged for backup operations

  - vmid: 301
    hostname: pihole
    node: n1minipve
    cores: 1
    memory: 512
    disk: "8"
    description: "Pi-hole — secondary DNS / ad-block"
    netif:
      net0: "name=eth0,bridge=vmbr0,tag=10,ip=10.0.10.3/24,gw=10.0.10.1"
    nameservers: "10.0.10.1"
    searchdomain: "lab.blerdmh.local"
    onboot: true
    unprivileged: true

# ── VMs to provision ─────────────────────────────────────────────────────
# VMID scheme:
#   100–109  Security stack (VLAN 40)
#   110–119  k3s workers (VLAN 20)
#   200–209  Red team (VLAN 61)
#   210–219  Purple lab (VLAN 62)

proxmox_provision_vms: true

proxmox_vms:
  # ── Security stack (AMDPVE, VLAN 40) ──────────────────────────────────
  - vmid: 100
    name: wazuh-vm
    node: amdpve
    cores: 8
    memory: 16384
    disk_size: "200G"
    vlan: 40
    ip: "10.0.40.10"
    gateway: "10.0.40.1"
    dns: "10.0.40.1"
    description: "Wazuh Manager + Dashboard + OpenSearch"
    tags: ["security", "wazuh", "siem"]
    onboot: true

  - vmid: 101
    name: ids-vm
    node: amdpve
    cores: 4
    memory: 8192
    disk_size: "100G"
    vlan: 40
    ip: "10.0.40.11"
    gateway: "10.0.40.1"
    dns: "10.0.40.1"
    description: "Suricata IDS + Zeek NSM"
    tags: ["security", "ids", "zeek", "suricata"]
    onboot: true

  - vmid: 102
    name: openvas-vm
    node: amdpve
    cores: 4
    memory: 8192
    disk_size: "100G"
    vlan: 40
    ip: "10.0.40.12"
    gateway: "10.0.40.1"
    dns: "10.0.40.1"
    description: "OpenVAS / Greenbone vulnerability scanner"
    tags: ["security", "vuln-scan"]
    onboot: true

  - vmid: 103
    name: grafana-vm
    node: amdpve
    cores: 4
    memory: 8192
    disk_size: "50G"
    vlan: 40
    ip: "10.0.40.13"
    gateway: "10.0.40.1"
    dns: "10.0.40.1"
    description: "Grafana + Prometheus observability"
    tags: ["security", "observability"]
    onboot: true

  # ── k3s worker VMs (VLAN 20) ──────────────────────────────────────────
  - vmid: 110
    name: k3s-w2-amd
    node: amdpve
    cores: 8
    memory: 16384
    disk_size: "200G"
    vlan: 20
    ip: "10.0.20.12"
    gateway: "10.0.20.1"
    dns: "10.0.20.1"
    description: "k3s worker VM with AMD RX 5700 XT PCIe passthrough — Jellyfin VAAPI"
    tags: ["k3s", "worker", "gpu"]
    onboot: true

  - vmid: 300
    name: k3s-w3-n1
    node: n1minipve
    cores: 6
    memory: 10240
    disk_size: "200G"
    vlan: 20
    ip: "10.0.20.13"
    gateway: "10.0.20.1"
    dns: "10.0.20.1"
    description: "k3s worker VM on N1 Mini — media/personal workloads"
    tags: ["k3s", "worker"]
    onboot: true

  # ── Red team (AMDPVE, VLAN 61) ────────────────────────────────────────
  - vmid: 200
    name: kali-red
    node: amdpve
    cores: 4
    memory: 8192
    disk_size: "100G"
    vlan: 61
    ip: "10.0.61.10"
    gateway: "10.0.61.1"
    dns: "10.0.61.1"
    description: "Kali Linux — red team operator box"
    tags: ["redteam", "kali"]
    onboot: false

  # ── Purple lab (AMDPVE, VLAN 62) ──────────────────────────────────────
  - vmid: 201
    name: win-target
    node: amdpve
    cores: 4
    memory: 8192
    disk_size: "100G"
    vlan: 62
    ip: "10.0.62.10"
    gateway: "10.0.62.1"
    dns: "10.0.62.1"
    description: "Windows Server 2022 — AD domain controller / target"
    tags: ["purple", "windows", "ad"]
    onboot: false

  - vmid: 202
    name: win-workstation
    node: amdpve
    cores: 2
    memory: 4096
    disk_size: "60G"
    vlan: 62
    ip: "10.0.62.11"
    gateway: "10.0.62.1"
    dns: "10.0.62.1"
    description: "Windows 11 — AD-joined workstation target"
    tags: ["purple", "windows"]
    onboot: false
