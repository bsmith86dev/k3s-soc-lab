---
# ansible/roles/common/handlers/main.yml
# Triggered by notify: in common tasks
# These run once at the end of a play, even if notified multiple times

# Service is `ssh.service` on both Debian 12 (Proxmox) and Ubuntu 24.04
# cloud images. `sshd` only resolves on RHEL-family distros.
- name: Restart sshd
  ansible.builtin.service:
    name: ssh
    state: restarted
  listen: "restart sshd"

- name: Restart fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: restarted
  listen: "restart fail2ban"

- name: Reload ufw
  ansible.builtin.command:
    cmd: ufw reload
  changed_when: false
  listen: "reload ufw"

- name: Restart chrony
  ansible.builtin.service:
    name: chrony
    state: restarted
  listen: "restart chrony"

- name: Restart rsyslog
  ansible.builtin.service:
    name: rsyslog
    state: restarted
  listen: "restart rsyslog"

- name: Restart unattended-upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    state: restarted
  listen: "restart unattended-upgrades"

- name: Reboot host
  ansible.builtin.reboot:
    reboot_timeout: 300
    msg: "Ansible triggered reboot after kernel/config change"
  listen: "reboot host"
