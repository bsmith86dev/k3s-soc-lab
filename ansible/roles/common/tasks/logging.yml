---
# ansible/roles/common/tasks/logging.yml
# Centralized syslog forwarding to Wazuh + local log retention config
# All hosts ship logs to Wazuh manager on VLAN 40 (10.0.40.10)

- name: Install rsyslog
  ansible.builtin.apt:
    name: rsyslog
    state: present

- name: Configure rsyslog to forward to Wazuh
  ansible.builtin.blockinfile:
    path: /etc/rsyslog.d/60-wazuh-forward.conf
    create: true
    mode: '0644'
    block: |
      # Forward all logs to Wazuh manager
      # Wazuh ingests these via its syslog input on port 514
      *.* @{{ common_wazuh_manager_ip }}:514
    marker: "# {mark} ANSIBLE MANAGED — WAZUH FORWARDING"
  notify: restart rsyslog
  # Skip on the Wazuh manager itself — forwarding 10.0.40.10 → 10.0.40.10
  # creates a UDP loop and floods the local Wazuh syslog input with its
  # own output. The manager ingests its own logs via the local agent.
  when: inventory_hostname not in groups['wazuh_manager'] | default([])


- name: Configure local log retention
  ansible.builtin.copy:
    dest: /etc/logrotate.d/lab-common
    mode: '0644'
    content: |
      /var/log/auth.log
      /var/log/syslog
      /var/log/kern.log
      /var/log/ufw.log {
          daily
          rotate 30
          compress
          delaycompress
          missingok
          notifempty
          sharedscripts
          postrotate
              /usr/lib/rsyslog/rsyslog-rotate
          endscript
      }

- name: Ensure log directories exist with correct permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: adm
    mode: '0750'
  loop:
    - /var/log/audit
    - /var/log/lab

- name: Enable and start rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    enabled: true
    state: started
