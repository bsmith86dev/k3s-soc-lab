---
# ansible/roles/common/tasks/fail2ban.yml
# fail2ban SSH protection — all lab Linux hosts

- name: Install fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: present

- name: Deploy fail2ban jail config from template
  ansible.builtin.template:
    src: fail2ban-jail.j2
    dest: /etc/fail2ban/jail.d/lab-ssh.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: yes
    state: started
