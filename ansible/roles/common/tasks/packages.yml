---
# ansible/roles/common/tasks/packages.yml
# Install baseline packages on all lab hosts

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install baseline packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present

- name: Remove unnecessary packages
  ansible.builtin.apt:
    name: "{{ common_packages_remove }}"
    state: absent
    purge: yes
    autoremove: yes
