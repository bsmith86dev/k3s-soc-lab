---
# ansible/roles/k3s/tasks/kubeconfig.yml
# Fetch kubeconfig from k3s control plane to Skynet workstation
# After this task, kubectl works from Skynet without SSHing to the Pi
#
# Output: ~/.kube/config on Skynet (merged with existing contexts)

- name: Read kubeconfig from k3s server
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: k3s_kubeconfig_raw

- name: Decode kubeconfig
  ansible.builtin.set_fact:
    k3s_kubeconfig: "{{ k3s_kubeconfig_raw.content | b64decode }}"

- name: Replace localhost with real control plane IP in kubeconfig
  ansible.builtin.set_fact:
    k3s_kubeconfig_fixed: >-
      {{ k3s_kubeconfig | replace('https://127.0.0.1:6443', 'https://' + ansible_host + ':6443') }}

- name: Ensure .kube directory exists on Skynet
  ansible.builtin.file:
    path: "~/.kube"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

- name: Write kubeconfig to Skynet
  ansible.builtin.copy:
    content: "{{ k3s_kubeconfig_fixed }}"
    dest: "~/.kube/config-blerdmh-lab"
    mode: '0600'
  delegate_to: localhost
  become: false

- name: Display kubeconfig instructions
  ansible.builtin.debug:
    msg: |
      Kubeconfig written to ~/.kube/config-blerdmh-lab on Skynet.

      To use:
        export KUBECONFIG=~/.kube/config-blerdmh-lab
        kubectl get nodes

      To merge with existing ~/.kube/config:
        KUBECONFIG=~/.kube/config:~/.kube/config-blerdmh-lab \
          kubectl config view --flatten > ~/.kube/config-merged
        mv ~/.kube/config-merged ~/.kube/config
  delegate_to: localhost
  become: false

- name: Verify cluster is reachable from Skynet
  ansible.builtin.command:
    cmd: kubectl get nodes
  environment:
    KUBECONFIG: "~/.kube/config-blerdmh-lab"
  delegate_to: localhost
  become: false
  register: kubectl_nodes
  changed_when: false
  failed_when: false

- name: Show cluster nodes
  ansible.builtin.debug:
    msg: "{{ kubectl_nodes.stdout_lines }}"
  delegate_to: localhost
  become: false
