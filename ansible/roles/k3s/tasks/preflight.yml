---
# ansible/roles/k3s/tasks/preflight.yml
# Pre-flight checks before k3s install
# Catches common problems early — saves debugging time later

- name: Configure passwordless sudo for Ansible user
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ ansible_user }}-nopasswd"
    content: "{{ ansible_user }} ALL=(ALL) NOPASSWD:ALL\n"  # pragma: allowlist secret
    mode: '0440'
    validate: visudo -cf %s

# Bootstrap DNS: set a public resolver for the duration of this Ansible run.
# k3s VMs sit on VLAN 20 and use the pfSense SERVERS interface (10.0.20.1)
# as their nameserver, but the SERVERS firewall blocks RFC1918 by default
# until the pfsense role's DNS rule is applied. Using resolvectl here sets
# the runtime resolver on the default interface immediately — no service
# restart needed — so all subsequent tasks (install script, kubectl apply,
# image pulls) can reach the internet. Once the pfSense DNS rule is in
# place this task is effectively a no-op (public DNS still works).
- name: Bootstrap DNS — check if resolvectl is available
  ansible.builtin.stat:
    path: /usr/bin/resolvectl
  register: k3s_resolvectl_bin

- name: Bootstrap DNS — set public resolver for Ansible run
  ansible.builtin.command:
    cmd: resolvectl dns {{ ansible_default_ipv4.interface }} 1.1.1.1 8.8.8.8
  changed_when: false
  when: k3s_resolvectl_bin.stat.exists

- name: Check OS is Ubuntu 22.04+ or Debian 11+
  ansible.builtin.assert:
    that:
      - ansible_distribution in ["Ubuntu", "Debian"]
      - ansible_distribution_major_version | int >= (11 if ansible_distribution == "Debian" else 22)
    fail_msg: "k3s role requires Ubuntu 22.04+ or Debian 11+. Found: {{ ansible_distribution }} {{ ansible_distribution_version }}"
    success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_version }}"

- name: Check minimum RAM (2GB)
  ansible.builtin.assert:
    that:
      - ansible_memtotal_mb >= k3s_min_ram_mb
    fail_msg: "Insufficient RAM: {{ ansible_memtotal_mb }}MB. Minimum {{ k3s_min_ram_mb }}MB required."
    success_msg: "RAM check passed: {{ ansible_memtotal_mb }}MB"

- name: Check minimum disk space on /
  ansible.builtin.assert:
    that:
      - (ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available > k3s_min_disk_bytes
    fail_msg: >-
      Insufficient disk space on /. Need at least
      {{ (k3s_min_disk_bytes / 1073741824) | round(1) }}GB free,
      have {{ ((ansible_mounts | selectattr('mount', 'equalto', '/') | list | first).size_available / 1073741824) | round(1) }}GB.
    success_msg: "Disk space check passed"

- name: Check hostname is set correctly
  ansible.builtin.assert:
    that:
      - ansible_hostname == inventory_hostname
    fail_msg: "Hostname mismatch: system is '{{ ansible_hostname }}', inventory expects '{{ inventory_hostname }}'. Fix before continuing."
    success_msg: "Hostname check passed: {{ ansible_hostname }}"

- name: Check kernel version supports cgroups v2
  ansible.builtin.assert:
    that:
      - ansible_kernel is version('5.4', '>=')
    fail_msg: "Kernel {{ ansible_kernel }} may not fully support cgroups v2. Upgrade kernel."
    success_msg: "Kernel check passed: {{ ansible_kernel }}"

- name: Enable cgroups v2 in boot config (Raspberry Pi)
  ansible.builtin.lineinfile:
    path: /boot/firmware/cmdline.txt
    backrefs: true
    regexp: '^(.*rootwait)(\s+cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1)?(.*)$'
    line: '\1 cgroup_enable=cpuset cgroup_enable=memory cgroup_memory=1\3'
  when: ansible_architecture in ['aarch64', 'armv7l']
  notify: reboot host

- name: Check if swap is disabled
  ansible.builtin.command:
    cmd: swapon --summary
  register: k3s_swap_status
  changed_when: false

- name: Disable swap (k3s recommendation)
  ansible.builtin.command:
    cmd: swapoff -a
  when: k3s_swap_status.stdout | length > 0
  changed_when: true

- name: Remove swap from fstab permanently
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\s+swap\s+.*)$'
    replace: '# \1  # Disabled by Ansible — k3s requires no swap'

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - br_netfilter
    - overlay
    - ip_vs
    - ip_vs_rr
    - ip_vs_wrr
    - ip_vs_sh
    - nf_conntrack

- name: Persist kernel modules across reboots
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k3s.conf
    content: |
      br_netfilter
      overlay
      ip_vs
      ip_vs_rr
      ip_vs_wrr
      ip_vs_sh
      nf_conntrack
    mode: '0644'

- name: Set required sysctl params for k3s networking
  ansible.posix.sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    sysctl_file: /etc/sysctl.d/99-k3s.conf
    reload: true
  loop:
    - {key: "net.bridge.bridge-nf-call-iptables", value: "1"}
    - {key: "net.bridge.bridge-nf-call-ip6tables", value: "1"}
    - {key: "net.ipv4.ip_forward", value: "1"}
    - {key: "net.ipv6.conf.all.forwarding", value: "1"}
