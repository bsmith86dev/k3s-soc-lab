---
# ansible/roles/k3s/tasks/tailscale.yml
# Install and configure Tailscale on k3s-cp (Pi 4)
# Role: subnet router — advertises all lab VLANs into the Tailscale network
# This enables remote access to all lab services without exposing ports
#
# After running:
#   1. Go to https://login.tailscale.com/admin/machines
#   2. Find k3s-cp and approve the advertised subnet routes
#   3. Test: from any Tailscale device, ssh techinb@10.0.20.10

- name: Check if Tailscale is already installed
  ansible.builtin.stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

- name: Add Tailscale APT signing key
  ansible.builtin.get_url:
    url: https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg
    dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
    mode: '0644'
  when: not tailscale_binary.stat.exists

- name: Add Tailscale APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main"
    filename: tailscale
    state: present
  when: not tailscale_binary.stat.exists

- name: Install Tailscale
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: yes

- name: Enable and start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    enabled: yes
    state: started

- name: Enable IP forwarding for subnet routing
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    sysctl_file: /etc/sysctl.d/99-tailscale.conf
    reload: yes
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: Check if Tailscale is already authenticated
  ansible.builtin.command:
    cmd: tailscale status --json
  register: tailscale_status
  changed_when: false
  failed_when: false

- name: Parse Tailscale auth status
  ansible.builtin.set_fact:
    tailscale_authenticated: >-
      {{ (tailscale_status.stdout | from_json).BackendState == 'Running'
         if tailscale_status.rc == 0
         else false }}

- name: Authenticate Tailscale with auth key
  ansible.builtin.command:
    cmd: >-
      tailscale up
      --authkey={{ vault_tailscale_auth_key }}
      --advertise-routes={{ k3s_tailscale_advertised_routes | join(',') }}
      --advertise-exit-node=false
      --hostname=k3s-cp-blerdmh
      --accept-dns=false
  when:
    - not tailscale_authenticated | bool
    - vault_tailscale_auth_key is defined
  no_log: true

- name: Update advertised routes if already authenticated
  ansible.builtin.command:
    cmd: >-
      tailscale set
      --advertise-routes={{ k3s_tailscale_advertised_routes | join(',') }}
  when:
    - tailscale_authenticated | bool
  changed_when: true

- name: Display Tailscale status
  ansible.builtin.command:
    cmd: tailscale status
  register: ts_status
  changed_when: false

- name: Show Tailscale status
  ansible.builtin.debug:
    msg: |
      Tailscale Status:
      {{ ts_status.stdout }}

      ACTION REQUIRED if routes show 'waiting for approval':
        1. Visit https://login.tailscale.com/admin/machines
        2. Find k3s-cp-blerdmh
        3. Click '...' → 'Edit route settings'
        4. Enable all advertised subnet routes
