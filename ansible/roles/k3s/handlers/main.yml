---
# ansible/roles/k3s/handlers/main.yml
# Triggered by notify: in k3s tasks

- name: Restart k3s server
  ansible.builtin.service:
    name: k3s
    state: restarted
  listen: "restart k3s server"

- name: Restart k3s agent
  ansible.builtin.service:
    name: k3s-agent
    state: restarted
  listen: "restart k3s agent"

- name: Restart tailscaled
  ansible.builtin.service:
    name: tailscaled
    state: restarted
  listen: "restart tailscaled"

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true
  listen: "reload systemd"

- name: Reboot host and wait for it to come back
  ansible.builtin.reboot:
    reboot_timeout: 300
    msg: "Rebooting to apply cgroup/kernel changes"
  listen: "reboot host"
