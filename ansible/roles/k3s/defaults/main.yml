---
# ansible/roles/k3s/defaults/main.yml

# ── Versions ──────────────────────────────────────────────────────────────
# Pin versions — update intentionally, never let them float
k3s_version: "v1.31.4+k3s1"
metallb_version: "0.14.5"
cert_manager_version: "1.14.4"
sealed_secrets_version: "0.26.3"

# ── Cluster networking ────────────────────────────────────────────────────
k3s_server_ip: "10.0.20.10"          # Pi 4 control plane
k3s_cluster_cidr: "10.42.0.0/16"     # Pod CIDR
k3s_service_cidr: "10.43.0.0/16"     # Service CIDR
k3s_cluster_dns: "10.43.0.10"        # CoreDNS ClusterIP

# MetalLB IP pool — carved from SERVERS VLAN, above DHCP range
metallb_ip_range: "10.0.20.200-10.0.20.250"

# Extra SANs for the k3s API server TLS cert
k3s_api_extra_sans: ""

# ── Tailscale ─────────────────────────────────────────────────────────────
k3s_tailscale_subnet_router: false    # Only true for Pi 4 (k3s-cp)
                                      # Set true in host_vars/k3s-cp/main.yml

k3s_tailscale_advertised_routes:
  - "10.0.10.0/24"    # MGMT
  - "10.0.20.0/24"    # SERVERS
  - "10.0.30.0/24"    # CEPH_PUB
  - "10.0.40.0/24"    # SECURITY
  - "10.0.60.0/24"    # PRODUCTION
