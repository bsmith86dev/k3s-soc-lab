---
# ansible/roles/pfsense/tasks/vlans.yml
# Ensures all VLAN interfaces exist and are correctly configured
# Physical uplink: igb1 (LAN port connected to MokerLink trunk port 1)

- name: Create VLAN 10 — MGMT (10.0.10.0/24)
  pfsensible.core.pfsense_vlan:
    interface: igb1
    vlan_id: 10
    descr: "MGMT"
    state: present
  delegate_to: "{{ pfsense_host }}"

- name: Create VLAN 20 — SERVERS (10.0.20.0/24)
  pfsensible.core.pfsense_vlan:
