---
# ansible/roles/pfsense/tasks/nat.yml
# Outbound NAT for all internal VLANs → WAN
#
# pfSense default: "Automatic outbound NAT" — auto-generates a masquerade
# rule for every LAN-type interface. It's simpler and more forgiving to
# let pfSense manage these automatically. These explicit rules are here
# as a safety net for the "Hybrid" / "Manual" modes and to make the
# ruleset diff-reviewable.
#
# Per pfsense_nat_outbound docs: leave `address` empty to masquerade
# behind the WAN interface's primary IP.
#
# Run after interfaces.yml so the friendly interfaces exist.

- name: "NAT | Outbound — MGMT VLAN 10"
  pfsensible.core.pfsense_nat_outbound:
    descr: "NAT_MGMT"
    interface: wan
    source: "10.0.10.0/24"
    destination: any
    address: ""
    state: present

- name: "NAT | Outbound — SERVERS VLAN 20"
  pfsensible.core.pfsense_nat_outbound:
    descr: "NAT_SERVERS"
    interface: wan
    source: "10.0.20.0/24"
    destination: any
    address: ""
    state: present

- name: "NAT | Outbound — SECURITY VLAN 40"
