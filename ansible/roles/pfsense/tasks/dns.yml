---
# ansible/roles/pfsense/tasks/dns.yml
# pfSense Unbound DNS resolver configuration via pfSense-pkg-RESTAPI v2
#
# API base: /api/v2/  (package: pfrest/pfSense-pkg-RESTAPI >= v2.7.6)
# Auth: HTTP Basic Auth — admin credentials from vault
# All tasks delegate_to: localhost — REST calls run from the control node.
#
# Pattern: GET existing overrides → compare → POST only missing entries.
# This makes the task idempotent without relying on pfSense returning 409
# (it returns 400 + response_id "MODEL_FIELDS_NOT_UNIQUE_TOGETHER" instead).
#
# To add a host: append to pfsense_dns_overrides in defaults/main.yml.

- name: "DNS | Configure Unbound resolver settings"
  ansible.builtin.uri:
    url: "https://{{ pfsense_host }}/api/v2/services/dns_resolver/settings"
    method: PATCH
    user: "{{ pfsense_user }}"
    password: "{{ pfsense_password }}"
    validate_certs: false
    force_basic_auth: true
    body_format: json
    body:
      enable: true
      dnssec: true
      forwarding: false
      port: "53"
      active_interface:
        - "all"
      outgoing_interface:
        - "wan"
      custom_options: |
        server:
          private-domain: "lab.blerdmh.local"
          private-domain: "home.blerdmh.local"
          local-zone: "10.0.10.in-addr.arpa." static
          local-zone: "20.0.10.in-addr.arpa." static
          local-zone: "40.0.10.in-addr.arpa." static
  register: pfsense_unbound_config
  failed_when: pfsense_unbound_config.status not in [200, 201, 204]
  delegate_to: localhost

- name: "DNS | Get existing host overrides from Unbound"
  ansible.builtin.uri:
    url: "https://{{ pfsense_host }}/api/v2/services/dns_resolver/host_overrides"
    method: GET
    user: "{{ pfsense_user }}"
    password: "{{ pfsense_password }}"
    validate_certs: false
    force_basic_auth: true
  register: pfsense_existing_dns
  delegate_to: localhost

- name: "DNS | Build list of existing host.domain pairs"
  ansible.builtin.set_fact:
    pfsense_pfsense_existing_dns_fqdns: >-
      {{
        pfsense_existing_dns.json.data
        | map(attribute='host')
        | zip(pfsense_existing_dns.json.data | map(attribute='domain'))
        | map('join', '.')
        | list
      }}

- name: "DNS | Create missing host overrides"
  ansible.builtin.uri:
    url: "https://{{ pfsense_host }}/api/v2/services/dns_resolver/host_override"
    method: POST
    user: "{{ pfsense_user }}"
    password: "{{ pfsense_password }}"
    validate_certs: false
    force_basic_auth: true
    body_format: json
    body:
      host: "{{ item.host }}"
      domain: "{{ item.domain }}"
      ip:
        - "{{ item.ip }}"
      descr: "{{ item.descr }}"
  loop: "{{ pfsense_dns_overrides }}"
  when: (item.host ~ '.' ~ item.domain) not in pfsense_pfsense_existing_dns_fqdns
  register: pfsense_dns_result
  failed_when: >
    pfsense_dns_result.status not in [200, 201, 204] and
    (pfsense_dns_result.json.response_id | default('')) != 'MODEL_FIELDS_NOT_UNIQUE_TOGETHER'
  delegate_to: localhost

- name: "DNS | Apply Unbound changes (reload resolver)"
  ansible.builtin.uri:
    url: "https://{{ pfsense_host }}/api/v2/services/dns_resolver/apply"
    method: POST
    user: "{{ pfsense_user }}"
    password: "{{ pfsense_password }}"
    validate_certs: false
    force_basic_auth: true
    body_format: json
    body: {}
  register: pfsense_dns_apply
  failed_when: pfsense_dns_apply.status not in [200, 201, 204]
  delegate_to: localhost
