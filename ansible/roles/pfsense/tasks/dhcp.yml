---
# ansible/roles/pfsense/tasks/dhcp.yml
# DHCP server config and static reservations for all VLANs
# Static reservations ensure consistent IPs before Ansible runs

- name: "DHCP | Configure MGMT VLAN 10 DHCP pool"
  pfsensible.core.pfsense_dhcp_server:
    interface: "MGMT"
    enable: true
    range_from: "10.0.10.100"
    range_to: "10.0.10.199"
    dnsserver: "10.0.10.1"
    gateway: "10.0.10.1"
    domain: "lab.blerdmh.local"
    state: present

# Each VLAN's DHCP MUST hand out its own gateway IP as the DNS server.
# pfSense Unbound listens on every interface (active_interface: all in
# dns.yml), so 10.0.20.1 / 10.0.40.1 are valid resolvers from inside
# their own VLAN. Pushing a cross-VLAN DNS (e.g. 10.0.10.1) gets
# silently dropped by the per-VLAN block_lateral rule and breaks DNS
# for every DHCP client on that VLAN.
- name: "DHCP | Configure SERVERS VLAN 20 DHCP pool"
  pfsensible.core.pfsense_dhcp_server:
    interface: "SERVERS"
    enable: true
    range_from: "10.0.20.100"
    range_to: "10.0.20.199"
    dnsserver: "10.0.20.1"
    gateway: "10.0.20.1"
    domain: "lab.blerdmh.local"
    state: present

- name: "DHCP | Configure SECURITY VLAN 40 DHCP pool"
  pfsensible.core.pfsense_dhcp_server:
    interface: "SECURITY"
    enable: true
    range_from: "10.0.40.100"
    range_to: "10.0.40.199"
    dnsserver: "10.0.40.1"
    gateway: "10.0.40.1"
    domain: "lab.blerdmh.local"
    state: present

# ─── Static DHCP Reservations ─────────────────────────────────────────────
# Set MAC addresses to actual values during initial pfSense setup
# These ensure every host gets a consistent IP before Ansible can run

- name: "DHCP | Reserve — Skynet workstation (VLAN 10)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "MGMT"
    macaddr: "{{ vault_skynet_mac }}"
    ipaddr: "10.0.10.10"
    name: "skynet"
    hostname: "skynet"
    descr: "Skynet — Ryzen 9 9950X3D workstation"
    state: present

- name: "DHCP | Reserve — AMDPVE (VLAN 10)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "MGMT"
    macaddr: "{{ vault_amdpve_mac }}"
    ipaddr: "10.0.10.20"
    name: "amdpve"
    hostname: "amdpve"
    descr: "AMDPVE — Ryzen 9 7900X primary Proxmox node"
    state: present

- name: "DHCP | Reserve — N1 Mini PVE (VLAN 10)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "MGMT"
    macaddr: "{{ vault_n1mini_mac }}"
    ipaddr: "10.0.10.21"
    name: "n1minipve"
    hostname: "n1mini"
    descr: "N1 Mini PVE — Ryzen 7 5825U secondary Proxmox node"
    state: present

- name: "DHCP | Reserve — ZimaBoard TrueNAS (VLAN 20)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "SERVERS"
    macaddr: "{{ vault_zimaboard_mac }}"
    ipaddr: "10.0.20.5"
    name: "truenas"
    hostname: "truenas"
    descr: "ZimaBoard 832 — TrueNAS Scale NAS"
    state: present

- name: "DHCP | Reserve — k3s-w2-amd AMD worker VM (VLAN 20)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "SERVERS"
    macaddr: "{{ pfsense_k3s_w2_amd_mac }}"
    ipaddr: "10.0.20.12"
    name: "k3s-w2-amd"
    hostname: "k3s-w2-amd"
    descr: "Proxmox VM 110 on amdpve — k3s AMD GPU worker"
    state: present

- name: "DHCP | Reserve — k3s-w3-n1 N1 Mini worker VM (VLAN 20)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "SERVERS"
    macaddr: "{{ pfsense_k3s_w3_n1_mac }}"
    ipaddr: "10.0.20.13"
    name: "k3s-w3-n1"
    hostname: "k3s-w3-n1"
    descr: "Proxmox VM 300 on n1minipve — k3s N1 Mini worker"
    state: present

- name: "DHCP | Reserve — Pi 4 k3s control plane (VLAN 20)"
  pfsensible.core.pfsense_dhcp_static:
    netif: "SERVERS"
    macaddr: "{{ vault_pi4_mac }}"
    ipaddr: "10.0.20.10"
    name: "k3s-cp"
    hostname: "k3s-cp"
    descr: "Raspberry Pi 4 8GB USB-NVMe — k3s control plane + Tailscale subnet router"
    state: present
