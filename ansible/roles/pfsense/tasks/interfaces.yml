---
# ansible/roles/pfsense/tasks/interfaces.yml
# Assigns each VLAN sub-interface (igc1.XX) to a friendly pfSense
# interface name and gives it a routable static IP.
#
# Why this file exists:
#   pfsensible.core.pfsense_vlan only creates the VLAN sub-interface on
#   the parent NIC. It does NOT assign that sub-interface to a friendly
#   interface or enable L3 routing. Without the assignment, traffic for
#   that VLAN arrives at pfSense and is dropped on the floor — no
#   gateway IP exists, so ARP fails on the client and "Destination Host
#   Unreachable" is returned from the client's own IP.
#
# This MUST run after vlans.yml and before rules.yml — the rules
# reference the friendly interface names (descr) created here.
#
# pfsense_interface param semantics (verified against pfsensible.core 0.7.1):
#   descr     = friendly interface name (LAN / SECURITY / SERVERS / etc.)
#   interface = physical port or VLAN sub-interface (igc1 / igc1.40 / ...)
#
# igc1.10 exists from initial pfSense setup with descr "LANManagement".
# Rename it to MGMT so that dhcp.yml and rules.yml can reference it
# by that name. IP stays 10.0.10.1/24 — no connectivity disruption.

- name: "INTERFACE | Rename igc1.10 to MGMT (was LANManagement)"
  pfsensible.core.pfsense_interface:
    descr: MGMT
    interface: "{{ pfsense_lan_interface }}.10"
    enable: true
    ipv4_type: static
    ipv4_address: 10.0.10.1
    ipv4_prefixlen: 24
    state: present

- name: Assign SERVERS VLAN 20
  pfsensible.core.pfsense_interface:
