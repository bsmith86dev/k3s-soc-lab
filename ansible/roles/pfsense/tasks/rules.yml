---
# ansible/roles/pfsense/tasks/rules.yml
# Intentional pfSense firewall policy.
# Rules are evaluated top-to-bottom on the INGRESS interface.
# All allow rules use `before:` anchors to guarantee insertion order
# relative to their VLAN's default-deny block rule.

