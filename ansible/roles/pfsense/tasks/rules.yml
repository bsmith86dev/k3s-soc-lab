---
# ansible/roles/pfsense/tasks/rules.yml
# Core firewall ruleset for all VLANs
# Prerequisites: aliases.yml must have run first
#
# Rule philosophy:
#   - Default deny all inter-VLAN traffic
#   - Explicit allow only for documented, justified flows
#   - SECURITY VLAN (40) has broad read access for monitoring
#   - RED_TEAM (61) is fully isolated — no egress except explicit
#   - IOT/HONEYPOT (50) internet only, no RFC1918 access

# ─── MGMT VLAN 10 ────────────────────────────────────────────────────────

- name: "MGMT | Allow MGMT_HOSTS to reach all VLANs (admin access)"
  pfsensible.core.pfsense_rule:
    name: "MGMT_to_ALL"
    interface: "MGMT"
    source: "MGMT_HOSTS"
    destination: any
    protocol: any
    action: pass
    # descr:"Admin workstation full access"
    state: present

- name: "MGMT | Allow DNS from all hosts to DNS_SERVERS"
  pfsensible.core.pfsense_rule:
    name: "MGMT_DNS"
    interface: "MGMT"
    source: "10.0.10.0/24"
    destination: "DNS_SERVERS"
    protocol: udp
    destination_port: 53
    action: pass
    # descr:"DNS resolution for MGMT VLAN"
    state: present

# Proxmox nodes live on MGMT (10.0.10.20/21) but their NFS storage and
# PBS backup target sit on SERVERS VLAN. Cross-VLAN traffic enters
# pfSense on the SOURCE interface (MGMT) — the SERVERS-interface rules
# never match because PROXMOX_NODES are never the source on SERVERS.
# Must land before MGMT_block_lateral or the block matches first.
- name: "MGMT | Allow Proxmox nodes to reach NAS (NFSv4)"
  pfsensible.core.pfsense_rule:
    name: "MGMT_pve_to_nas_nfs"
    interface: "MGMT"
    source: "PROXMOX_NODES"
    destination: "NAS_HOST"
    protocol: tcp
    destination_port: "NFS_PORTS"
    action: pass
    before: "MGMT_block_lateral"
    # descr:"Proxmox NFS mount to TrueNAS (portmapper, nfs, mountd)"
    state: present

- name: "MGMT | Allow Proxmox nodes to reach PBS API"
  pfsensible.core.pfsense_rule:
    name: "MGMT_pve_to_pbs"
    interface: "MGMT"
    source: "PROXMOX_NODES"
    destination: "PBS_HOST"
    protocol: tcp
    destination_port: "PBS_API_PORT"
    action: pass
    before: "MGMT_block_lateral"
    # descr:"Proxmox Backup Server API for backup/restore jobs"
    state: present

- name: "MGMT | Block MGMT to RFC1918 (non-admin hosts)"
  pfsensible.core.pfsense_rule:
    name: "MGMT_block_lateral"
    interface: "MGMT"
    source: "10.0.10.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Block non-admin MGMT hosts from reaching other VLANs"
    state: present

- name: "MGMT | Allow internet egress"
  pfsensible.core.pfsense_rule:
    name: "MGMT_inet"
    interface: "MGMT"
    source: "10.0.10.0/24"
    destination: any
    action: pass
    # descr:"MGMT internet access"
    state: present

# ─── SERVERS VLAN 20 ─────────────────────────────────────────────────────

# Cleanup: k3s nodes (10.0.20.10/12/13) and TrueNAS (10.0.20.5) are in
# the same VLAN. Intra-VLAN traffic is L2-switched at the MokerLink and
# never reaches pfSense, so these rules can never match. Removing.
- name: "SERVERS | (cleanup) remove dead k3s→NAS NFS rule"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_k3s_to_nas_nfs"
    interface: "SERVERS"
    state: absent

- name: "SERVERS | (cleanup) remove dead k3s→NAS NFSv4 rule"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_k3s_to_nas_nfsv4"
    interface: "SERVERS"
    state: absent

# Internet egress is needed by every host on the SERVERS VLAN, not just
# the k3s nodes (TrueNAS pulls updates, PBS pulls Debian packages, etc.).
# Source must be the entire VLAN — narrowing to K3S_NODES previously
# meant TrueNAS at 10.0.20.5 had no path off-net and broke during updates.
- name: "SERVERS | Allow SERVERS VLAN internet egress"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_inet"
    interface: "SERVERS"
    source: "10.0.20.0/24"
    destination: "!RFC1918"
    action: pass
    before: "SERVERS_block_lateral"
    # descr:"All SERVERS hosts: container pulls, package updates, threat intel"
    state: present

# Cleanup: PROXMOX_NODES live on MGMT VLAN (10.0.10.x), so they can
# never be the source on the SERVERS interface — these rules were dead
# the moment they shipped. Replaced by MGMT_pve_to_nas_nfs / MGMT_pve_to_pbs
# above, which sit on the correct ingress interface.
- name: "SERVERS | (cleanup) remove dead pve→NAS NFS rule"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_pve_to_nas_nfs"
    interface: "SERVERS"
    state: absent

- name: "SERVERS | (cleanup) remove dead pve→NAS PBS rule"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_pve_to_nas_pbs"
    interface: "SERVERS"
    state: absent

# DNS allow must cover the entire VLAN — TrueNAS, PBS, and any future
# SERVERS host hands out 10.0.20.1 as resolver via DHCP. Sourcing only
# K3S_NODES previously meant TrueNAS DNS lookups hit SERVERS_block_lateral
# and were silently dropped (10.0.20.1 is RFC1918 → matches the block).
- name: "SERVERS | Allow SERVERS VLAN DNS to pfSense Unbound"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_dns"
    interface: "SERVERS"
    source: "10.0.20.0/24"
    destination: "10.0.20.1"
    protocol: udp
    destination_port: "53"
    action: pass
    before: "SERVERS_block_lateral"
    # descr:"All SERVERS hosts resolve via pfSense Unbound on SERVERS interface"
    state: present

- name: "SERVERS | Block inter-server lateral movement by default"
  pfsensible.core.pfsense_rule:
    name: "SERVERS_block_lateral"
    interface: "SERVERS"
    source: "10.0.20.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Default deny lateral movement within SERVERS VLAN"
    state: present

# ─── SECURITY VLAN 40 ────────────────────────────────────────────────────

# Every SECURITY VM resolves DNS via 10.0.40.1 (pushed by DHCP). Without
# this allow, queries hit SECURITY_block_other (10.0.40.1 is RFC1918) and
# Wazuh / Suricata / OpenVAS lose DNS — threat intel pulls and rule
# updates silently fail.
- name: "SECURITY | Allow SECURITY VLAN DNS to pfSense Unbound"
  pfsensible.core.pfsense_rule:
    name: "SECURITY_dns"
    interface: "SECURITY"
    source: "10.0.40.0/24"
    destination: "10.0.40.1"
    protocol: udp
    destination_port: "53"
    action: pass
    before: "SECURITY_block_other"
    # descr:"All SECURITY hosts resolve via pfSense Unbound on SECURITY interface"
    state: present

- name: "SECURITY | Allow SECURITY_VMS to read logs from all VLANs (Wazuh)"
  pfsensible.core.pfsense_rule:
    name: "SECURITY_wazuh_ingest"
    interface: "SECURITY"
    source: "SECURITY_VMS"
    destination: "RFC1918"
    protocol: tcp
    destination_port: "WAZUH_PORTS"
    action: pass
    # descr:"Wazuh agent comms and syslog ingest from all VLANs"
    state: present

- name: "SECURITY | Allow SECURITY_VMS internet for threat intel feeds"
  pfsensible.core.pfsense_rule:
    name: "SECURITY_inet"
    interface: "SECURITY"
    source: "SECURITY_VMS"
    destination: "!RFC1918"
    action: pass
    # descr:"Threat intel feed updates, CVE lookups"
    state: present

- name: "SECURITY | Block unsanctioned egress from SECURITY VLAN"
  pfsensible.core.pfsense_rule:
    name: "SECURITY_block_other"
    interface: "SECURITY"
    source: "10.0.40.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Security VMs should not initiate connections into other VLANs"
    state: present

# ─── IOT / HONEYPOT VLAN 50 ──────────────────────────────────────────────

- name: "IOT | Block IOT from all RFC1918 (strict isolation)"
  pfsensible.core.pfsense_rule:
    name: "IOT_block_rfc1918"
    interface: "IOT_HONEYPOT"
    source: "10.0.50.0/24"
    destination: "RFC1918"
    action: block
    # descr:"IoT and honeypot devices cannot reach internal networks"
    state: present

- name: "IOT | Allow IOT internet egress only"
  pfsensible.core.pfsense_rule:
    name: "IOT_inet"
    interface: "IOT_HONEYPOT"
    source: "10.0.50.0/24"
    destination: any
    action: pass
    # descr:"IoT devices get internet access only"
    state: present

# ─── PRODUCTION VLAN 60 ──────────────────────────────────────────────────

- name: "PROD | Allow PRODUCTION to reach SERVERS HTTP (k3s workloads)"
  pfsensible.core.pfsense_rule:
    name: "PROD_to_servers_http"
    interface: "PRODUCTION"
    source: "10.0.60.0/24"
    destination: "K3S_NODES"
    protocol: tcp
    destination_port: "80"
    action: pass
    # descr:"Production clients access k3s services HTTP"
    state: present

- name: "PROD | Allow PRODUCTION to reach SERVERS HTTPS (k3s workloads)"
  pfsensible.core.pfsense_rule:
    name: "PROD_to_servers_https"
    interface: "PRODUCTION"
    source: "10.0.60.0/24"
    destination: "K3S_NODES"
    protocol: tcp
    destination_port: "443"
    action: pass
    # descr:"Production clients access k3s services HTTPS"
    state: present

- name: "PROD | Allow PRODUCTION internet egress"
  pfsensible.core.pfsense_rule:
    name: "PROD_inet"
    interface: "PRODUCTION"
    source: "10.0.60.0/24"
    destination: "!RFC1918"
    action: pass
    # descr:"Production VLAN internet access"
    state: present

- name: "PROD | Block PRODUCTION from reaching other internal VLANs"
  pfsensible.core.pfsense_rule:
    name: "PROD_block_lateral"
    interface: "PRODUCTION"
    source: "10.0.60.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Production VLAN default deny lateral"
    state: present

# ─── RED TEAM VLAN 61 ────────────────────────────────────────────────────

- name: "REDTEAM | Block RED_TEAM from ALL RFC1918 (full isolation)"
  pfsensible.core.pfsense_rule:
    name: "REDTEAM_block_rfc1918"
    interface: "RED_TEAM"
    source: "10.0.61.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Red team VLAN fully isolated from all internal networks"
    state: present

- name: "REDTEAM | Allow RED_TEAM controlled internet for tool downloads"
  pfsensible.core.pfsense_rule:
    name: "REDTEAM_inet_controlled"
    interface: "RED_TEAM"
    source: "10.0.61.0/24"
    destination: "!RFC1918"
    action: pass
    # descr:"Red team internet — review logs; disable when not in use"
    state: present

# ─── PURPLE LAB VLAN 62 ──────────────────────────────────────────────────

- name: "PURPLE | Allow PURPLE_LAB to reach SECURITY_VMS (log shipping)"
  pfsensible.core.pfsense_rule:
    name: "PURPLE_to_security"
    interface: "PURPLE_LAB"
    source: "10.0.62.0/24"
    destination: "SECURITY_VMS"
    protocol: tcp
    destination_port: "WAZUH_PORTS"
    action: pass
    # descr:"Purple lab VMs ship logs to Wazuh for detection exercise"
    state: present

- name: "PURPLE | Block PURPLE_LAB from other VLANs"
  pfsensible.core.pfsense_rule:
    name: "PURPLE_block_other"
    interface: "PURPLE_LAB"
    source: "10.0.62.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Purple lab isolated except for SECURITY VLAN log shipping"
    state: present

# ─── GUEST / DMZ VLAN 70 ─────────────────────────────────────────────────

- name: "GUEST | Block GUEST from ALL internal networks"
  pfsensible.core.pfsense_rule:
    name: "GUEST_block_rfc1918"
    interface: "GUEST_DMZ"
    source: "10.0.70.0/24"
    destination: "RFC1918"
    action: block
    # descr:"Guest VLAN cannot reach any internal network"
    state: present

- name: "GUEST | Allow GUEST internet only"
  pfsensible.core.pfsense_rule:
    name: "GUEST_inet"
    interface: "GUEST_DMZ"
    source: "10.0.70.0/24"
    destination: any
    action: pass
    # descr:"Guest internet access only"
    state: present
