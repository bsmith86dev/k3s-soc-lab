---
# .yamllint.yml
# YAML lint configuration
# Enforced in CI (01-ci.yml) and pre-commit hooks

extends: default

rules:
  document-start:
    present: true

  indentation:
    spaces: 2
    indent-sequences: consistent
    check-multi-line-strings: false

  line-length:
    max: 160
    level: warning

  truthy:
    allowed-values: ['true', 'false', 'true', 'no', 'on', 'off']
    check-keys: false

ignore: |
  .git/
  .ansible/
  site/
  *.sealed.yml
  ansible/inventory/group_vars/all/vault.yml
