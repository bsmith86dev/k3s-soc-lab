apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: homarr-appdata-pvc
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: dashboards
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: nfs-client
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: homarr-secret
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homarr
type: Opaque
stringData:
  # Replace with: openssl rand -hex 32
  # Then seal this file or split this Secret into secret-sealed.yml before committing real values.
  SECRET_ENCRYPTION_KEY: CHANGEME_REPLACE_AND_SEAL
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: dashboards
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: homarr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homarr
        app.kubernetes.io/part-of: dashboards
    spec:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 7575
          env:
            - name: TZ
              value: America/Chicago
            - name: SECRET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: homarr-secret
                  key: SECRET_ENCRYPTION_KEY
          volumeMounts:
            - name: appdata
              mountPath: /appdata
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: appdata
          persistentVolumeClaim:
            claimName: homarr-appdata-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: homarr
  namespace: monitoring
  labels:
    app.kubernetes.io/name: homarr
    app.kubernetes.io/part-of: dashboards
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: homarr
  ports:
    - name: http
      port: 7575
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homarr
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: traefik
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: Homarr
    gethomepage.dev/group: Dashboards
    gethomepage.dev/icon: homarr.png
    gethomepage.dev/description: Homelab application dashboard
spec:
  rules:
    - host: homarr.lab.blerdmh.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homarr
                port:
                  number: 7575
