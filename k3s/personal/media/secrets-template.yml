---
# k3s/personal/media/secrets-template.yml
# SECRET TEMPLATES — DO NOT COMMIT PLAINTEXT VALUES
#
# These show the structure of secrets needed by the media stack.
# Seal each one with kubeseal before committing.
#
# Workflow:
#   1. Edit this file with real values (temporarily)
#   2. Apply to cluster: kubectl apply -f secrets-template.yml
#      OR seal it: kubeseal --format yaml < secrets-template.yml > secret-sealed.yml
#   3. Delete the plaintext file / revert changes
#   4. Commit the *-sealed.yml file only
#
# ── Gluetun VPN credentials ───────────────────────────────────────────────
# Get values from your VPN provider's WireGuard configuration page.
# Supported providers: mullvad, protonvpn, nordvpn, and many others.
# See https://github.com/qdm12/gluetun-wiki for provider-specific vars.

apiVersion: v1
kind: Secret
metadata:
  name: gluetun-secret
  namespace: media
type: Opaque
stringData:
  VPN_SERVICE_PROVIDER: "mullvad"        # Your VPN provider name
  WIREGUARD_PRIVATE_KEY: "CHANGEME"      # WireGuard private key from provider
  WIREGUARD_ADDRESSES: "CHANGEME"        # e.g. 10.64.0.1/32

---
# ── ARR app API keys ──────────────────────────────────────────────────────
# Get each API key from the app's Settings → General → Security → API Key
# These are needed by Huntarr and Unpackerr to talk to Radarr/Sonarr/Lidarr.
# Generate after first deploying each ARR app.

apiVersion: v1
kind: Secret
metadata:
  name: arr-api-keys
  namespace: media
type: Opaque
stringData:
  SONARR_API_KEY: "CHANGEME"
  RADARR_API_KEY: "CHANGEME"
  LIDARR_API_KEY: "CHANGEME"
  PROWLARR_API_KEY: "CHANGEME"
