---
# k3s/personal/media/radarr-sonarr-lidarr.yml
# Radarr (movies), Sonarr (TV), Lidarr (music)
#
# All three follow the same pattern:
#   - Connect to Prowlarr for indexers (auto-synced)
#   - Connect to SABnzbd (http://gluetun.media.svc:8080) for Usenet downloads
#   - Connect to qBittorrent (http://gluetun.media.svc:8090) for torrent downloads
#   - Read/write to shared /media NFS volume
#   - Bazarr connects to Radarr + Sonarr for subtitle management
#
# ARR connection summary (configure in each app's Settings → Download Clients):
#   SABnzbd:      http://gluetun.media.svc.cluster.local:8080
#   qBittorrent:  http://gluetun.media.svc.cluster.local:8090
#   Prowlarr:     http://prowlarr.media.svc.cluster.local:9696  (auto-sync)
#   Huntarr:      reads Radarr/Sonarr API for missing content hunting

# ── Radarr ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
  labels:
    app: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:latest
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: "America/Chicago"
          ports:
            - containerPort: 7878
              name: http
          volumeMounts:
            - name: radarr-config
              mountPath: /config
            - name: media-library
              mountPath: /media
            - name: media-downloads
              mountPath: /downloads
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: radarr-config
          persistentVolumeClaim:
            claimName: radarr-config-pvc
        - name: media-library
          persistentVolumeClaim:
            claimName: media-library-pvc
        - name: media-downloads
          persistentVolumeClaim:
            claimName: media-downloads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
spec:
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878
      name: http

